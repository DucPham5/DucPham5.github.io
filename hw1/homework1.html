    <!DOCTYPE html>
    <html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="HW1" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="homework1.css">
        <title>HW1</title>
    </head>
    <body>
        <div id="header">
            <img src="medicallogo.jpg" alt="logo" id="logo">

            <!-- Company Name -->
            <h1>Cedarwood Medical Center</h1>

            <!-- Dynamic Date -->
            <p>Today is: <span id="currentDate"></span></p>
        </div>
        <div id = "body-content">
            <div class = "paper">
             <form action="homework1-thankyou.html">
                
                <table class="form">
                
                    <th class="form" colspan="3">Patient Form</th>
                    <tr>
                        <td><label for="fullName">Name:</label></td>
                        <td colspan="3">
                            <input type="text" id="firstName" name="firstName" maxlength="30" placeholder="First" required>
                            <input type="text" id="middleInitial" name="middleInitial" maxlength="1" style="width:40px" placeholder="MI">
                            <input type="text" id="lastName" name="lastName" maxlength="30" placeholder="Last" required>
                        </td>
                    </tr>
                    <tr><!--DOB-->
                        <td><label for="dob">Date of Birth:</label></td>
                        <td><input type="date" id="dob" name="dob" required></td>
                    </tr>
                    <tr><!--Phone #-->
                        <td><label for="phone">Phone Number:</label></td>
                        <td><input type="text" id="phone" name="phone" placeholder="(123)-456-7890" pattern="[0-9]*" required></td>
                    </tr>
                    <tr><!--SSN-->
                        <td><label for="ssn">Social Security Number:</label></td>
                        <td>
                            <input type="text"
                                id="ssn"
                                name="ssn"
                                maxlength="7"
                                pattern="[0-9]{7}"
                                placeholder="0000000"
                                required
                                title="SSN must be exactly 7 digits">
                        </td>
                    </tr>
                    <tr><!--Address1-->
                        <td><label for="address1">Address Line 1:</label></td>
                        <td><input type="text" id="address1" name="address1" required></td>
                    </tr>
                    <tr><!--Address2-->
                        <td><label for="address2">Address Line 2:</label></td>
                        <td><input type="text" id="address2" name="address2"></td>
                    </tr>
                    <tr><!--City/State/ZIP-->
                        <td><label for="cityStateZip">City / State / ZIP:</label></td>
                        <td>
                            <input type="text" id="city" name="city" placeholder="City" style="width:120px; margin-right:5px;" required>
                            
                            <select id="state" name="state" required style="width:100px; margin-right:5px;">
                                <option value=""></option>
                                <option value="AL">Alabama</option>
                                <option value="AK">Alaska</option>
                                <option value="AZ">Arizona</option> 
                                <option value="AR">Arkansas</option>
                                <option value="CA">California</option>
                                <option value="CO">Colorado</option>
                                <option value="CT">Connecticut</option>
                                <option value="DE">Delaware</option>
                                <option value="DC">District Of Columbia</option>
                                <option value="FL">Florida</option>
                                <option value="GA">Georgia</option>
                                <option value="HI">Hawaii</option>
                                <option value="ID">Idaho</option>
                                <option value="IL">Illinois</option>
                                <option value="IN">Indiana</option>
                                <option value="IA">Iowa</option>
                                <option value="KS">Kansas</option>
                                <option value="KY">Kentucky</option>
                                <option value="LA">Louisiana</option>
                                <option value="ME">Maine</option>
                                <option value="MD">Maryland</option>
                                <option value="MA">Massachusetts</option>
                                <option value="MI">Michigan</option>
                                <option value="MN">Minnesota</option>
                                <option value="MS">Mississippi</option>
                                <option value="MO">Missouri</option>
                                <option value="MT">Montana</option>
                                <option value="NE">Nebraska</option>
                                <option value="NV">Nevada</option>
                                <option value="NH">New Hampshire</option>
                                <option value="NJ">New Jersey</option>
                                <option value="NM">New Mexico</option>
                                <option value="NY">New York</option>
                                <option value="NC">North Carolina</option>
                                <option value="ND">North Dakota</option>
                                <option value="OH">Ohio</option>
                                <option value="OK">Oklahoma</option>
                                <option value="OR">Oregon</option>
                                <option value="PA">Pennsylvania</option>
                                <option value="RI">Rhode Island</option>
                                <option value="SC">South Carolina</option>
                                <option value="SD">South Dakota</option>
                                <option value="TN">Tennessee</option>
                                <option value="TX">Texas</option>
                                <option value="UT">Utah</option>
                                <option value="VT">Vermont</option>
                                <option value="VA">Virginia</option>
                                <option value="WA">Washington</option>
                                <option value="WV">West Virginia</option>
                                <option value="WI">Wisconsin</option>
                                <option value="WY">Wyoming</option>
                            </select>
                            
                            <input type="text" pattern="[0-9]{5}" id="zip" name="zip" maxlength="5" placeholder="ZIP" style="width:60px;" required>
                        </td>
                    </tr>
                    <tr>
                        <td><label for="email">Email:</label></td>
                        <td>
                            <input type="email"
                                id="email"
                                name="email"
                                required
                                placeholder="example@email.com">
                        </td>
                    </tr>
                    <tr>
                        <td><label for="symptoms">Describe Current Symptoms:</label></td>
                        <td>
                            <textarea id="symptoms"
                                    name="symptoms"
                                    rows="3"
                                    cols="50"
                                    required
                                    placeholder="Please describe your symptoms..."></textarea>
                        </td>
                    </tr>
                    <tr><!--check boxes-->
                        <td>Check all conditions you have had:</td>
                        <td>
                            <input type="checkbox" id="chickenpox" name="conditions" value="chickenpox">
                            <label for="chickenpox">Chicken Pox</label><br>

                            <input type="checkbox" id="measles" name="conditions" value="measles">
                            <label for="measles">Measles</label><br>

                            <input type="checkbox" id="covid" name="conditions" value="covid">
                            <label for="covid">COVID-19</label><br>

                            <input type="checkbox" id="smallpox" name="conditions" value="smallpox">
                            <label for="smallpox">Small Pox</label><br>

                            <input type="checkbox" id="tetanus" name="conditions" value="tetanus">
                            <label for="tetanus">Tetanus</label>
                        </td>
                    </tr>
                    <tr>
                        <td>Gender:</td>
                        <td>
                            <input type="radio" id="male" name="gender" value="male" required>
                            <label for="male">Male</label>

                            <input type="radio" id="female" name="gender" value="female">
                            <label for="female">Female</label>

                            <input type="radio" id="other" name="gender" value="other">
                            <label for="other">Other</label>
                        </td>
                    </tr>
                    <tr><!--radio buttons-->
                        <td>Have you been vaccinated?</td>
                        <td>
                            <input type="radio" id="vaccineYes" name="vaccinated" value="yes" required>
                            <label for="vaccineYes">Yes</label>

                            <input type="radio" id="vaccineNo" name="vaccinated" value="no">
                            <label for="vaccineNo">No</label>
                        </td>
                    </tr>
                    <tr>
                        <td>Do you have insurance?</td>
                        <td>
                            <input type="radio" id="insuranceYes" name="insurance" value="yes" required>
                            <label for="insuranceYes">Yes</label>

                            <input type="radio" id="insuranceNo" name="insurance" value="no">
                            <label for="insuranceNo">No</label>
                        </td>
                    </tr>
                    <tr><!--Scale-->
                        <td><label for="health">On a scale of 1–10, how is your health?</label></td>
                        <td>
                            <input type="range"
                                id="health"
                                name="health"
                                min="1"
                                max="10"
                                value="5">
                        </td>
                    </tr>
                    <tr><!--userid-->
                        <td><label for="userid">User ID:</label></td>
                        <td>
                            <input type="text"
                                id="userid"
                                name="userid"
                                maxlength="20"
                                required>
                        </td>
                    </tr>
                    <tr><!--password-->
                        <td><label for="password">Password:</label></td>
                        <td>
                            <input type="password"
                                id="password"
                                name="password"
                                required>
                        </td>
                    </tr>

                    <tr>
                        <td><label for="confirmPassword">Re-enter Password:</label></td>
                        <td>
                            <input type="password"
                                id="confirmPassword"
                                name="confirmPassword"
                                required>
                        </td>
                    </tr>
                    <tr><!--reset and submit buttons-->
                        <td colspan="2" style="text-align: center; padding-top: 15px;">
                            <!-- Reset Button -->
                            <input type="reset" value="CLEAR">

                            <!-- Submit Button -->
                            <input type="submit" value="Submit">
                        </td>
                    </tr>
                </table>
             </form>
            </div>
        </div>
        <!--Footer Section-->
        <div id = "footer">
            <p>Cedarwood Medical Center</p>
            <a href="mailto:dmpham8@cougarnet.uh.edu" class="email-btn">Contact Us</a>
        </div>
    <script>
        document.getElementById("currentDate").innerHTML = new Date().toLocaleDateString();
    </script>
    </body>
    </html>
